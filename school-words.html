<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stage 4 Chinese — School Words 学校词语</title>
<meta name="description" content="Learn the Chinese words for school, subjects and days — Year 7 & 8. Tap to hear, flip flashcards, and test yourself.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Nunito:wght@400;600;800;900&display=swap');
  :root{
    --ink:#27303b; --muted:#5f6b78; --line:#dde4ec; --paper:#fff; --wash:#f4f7fb;
    --orange:#c2540a; --orange-soft:#fdeede; --indigo:#3f51b5; --indigo-soft:#eceffb;
    --green:#2e7d32; --green-soft:#e9f5ea; --teal:#0d7d74; --teal-soft:#e2f3f1;
    --gold:#b7791f; --gold-soft:#fbf0d9;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--wash);color:var(--ink);
    font-family:'Nunito','Noto Sans SC',-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.6;}
  .zh{font-family:'Noto Sans SC',sans-serif;}
  main{width:min(1000px,calc(100% - 28px));margin:24px auto 70px;background:var(--paper);
    border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 48px rgba(39,48,59,.08);overflow:hidden;}
  header{padding:40px 40px 30px;border-bottom:1px solid var(--line);
    background:linear-gradient(135deg,rgba(46,125,50,.13),rgba(13,125,116,.10) 60%,rgba(63,81,181,.10)),#fff;}
  .back{display:inline-block;font-size:13px;font-weight:800;color:var(--green);text-decoration:none;margin-bottom:14px;}
  .back:hover{text-decoration:underline;}
  h1{margin:0 0 8px;font-size:34px;font-weight:900;letter-spacing:.3px;}
  h1 .zh{color:var(--green);font-weight:900;}
  .subtitle{color:var(--muted);font-size:16px;margin:0 0 16px;}
  .badges span{display:inline-block;font-size:12px;font-weight:800;padding:4px 12px;border-radius:999px;margin-right:8px;}
  .b-y7{background:var(--orange-soft);color:var(--orange);} .b-y8{background:var(--indigo-soft);color:var(--indigo);}

  /* control bar */
  .controls{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);padding:12px 40px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;}
  .tabs{display:flex;gap:6px;background:var(--wash);padding:5px;border-radius:12px;}
  .tab{border:0;background:transparent;font-family:inherit;font-weight:800;font-size:14px;color:var(--muted);
    padding:8px 16px;border-radius:9px;cursor:pointer;transition:.15s;}
  .tab.active{background:#fff;color:var(--green);box-shadow:0 2px 8px rgba(39,48,59,.10);}
  .toggles{display:flex;gap:9px;flex-wrap:wrap;margin-left:auto;}
  .chip{border:1px solid var(--line);background:#fff;font-family:inherit;font-weight:800;font-size:13px;color:var(--muted);
    padding:8px 14px;border-radius:999px;cursor:pointer;transition:.15s;user-select:none;}
  .chip.on{background:var(--green-soft);border-color:#bfe0c2;color:var(--green);}
  .chip .x{font-weight:900;}

  section.view{padding:30px 40px;}
  .hidden{display:none!important;}
  .cat{margin-bottom:30px;}
  .cat:last-child{margin-bottom:0;}
  .cat h2{margin:0 0 12px;font-size:20px;font-weight:900;display:flex;align-items:center;gap:10px;}
  .cat h2 .dot{width:12px;height:12px;border-radius:4px;flex:none;}
  .cat-sub .dot{background:var(--green);} .cat-subj .dot{background:var(--indigo);}
  .cat-day .dot{background:var(--orange);} .cat-use .dot{background:var(--teal);}
  .cat-pat .dot{background:var(--gold);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:13px;}
  .word{border:1px solid var(--line);border-radius:13px;padding:15px 15px 13px;background:#fff;cursor:pointer;
    transition:.15s;position:relative;text-align:left;}
  .word:hover{transform:translateY(-2px);box-shadow:0 9px 22px rgba(39,48,59,.10);border-color:#cfd8e2;}
  .word .hz{font-size:30px;font-weight:900;line-height:1.2;}
  .word .py{font-size:15px;font-weight:700;color:var(--teal);margin-top:3px;}
  .word .en{font-size:14px;color:var(--muted);margin-top:2px;}
  .word .spk{position:absolute;top:10px;right:10px;border:0;background:var(--green-soft);color:var(--green);
    width:30px;height:30px;border-radius:9px;font-size:15px;cursor:pointer;line-height:1;display:grid;place-items:center;}
  .word .spk:hover{background:#d3edd6;}
  /* pattern cards wider */
  .grid.patterns{grid-template-columns:1fr;}
  .grid.patterns .word .hz{font-size:25px;}
  body.no-py .py{display:none;} body.no-en .en{display:none;}

  /* flashcards */
  .fc-wrap{max-width:520px;margin:0 auto;text-align:center;}
  .fc-pick{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
  .fc-pick select{font-family:inherit;font-weight:700;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  .card3d{perspective:1200px;height:260px;margin-bottom:18px;}
  .card3d .inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer;}
  .card3d.flipped .inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:18px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#fff;box-shadow:0 12px 30px rgba(39,48,59,.08);padding:20px;}
  .face.back{transform:rotateY(180deg);background:var(--green-soft);}
  .face .big{font-size:60px;font-weight:900;line-height:1.1;}
  .face .mid{font-size:24px;font-weight:800;color:var(--teal);}
  .face .sm{font-size:18px;color:var(--muted);}
  .face .taphint{position:absolute;bottom:12px;font-size:12px;color:#9aa6b2;font-weight:700;}
  .btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .btn{font-family:inherit;font-weight:800;font-size:14px;padding:11px 18px;border-radius:11px;border:1px solid var(--line);
    background:#fff;color:var(--ink);cursor:pointer;transition:.15s;}
  .btn:hover{border-color:var(--green);color:var(--green);}
  .btn.primary{background:var(--green);border-color:var(--green);color:#fff;}
  .btn.primary:hover{background:#256528;color:#fff;}
  .fc-count{font-size:13px;color:var(--muted);font-weight:700;margin-top:14px;}

  /* quiz */
  .quiz-wrap{max-width:560px;margin:0 auto;text-align:center;}
  .q-prompt{font-size:15px;color:var(--muted);font-weight:700;margin-bottom:6px;}
  .q-term{font-size:46px;font-weight:900;margin-bottom:4px;}
  .q-termpy{font-size:18px;font-weight:700;color:var(--teal);margin-bottom:20px;min-height:24px;}
  .q-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{font-family:inherit;font-weight:800;font-size:17px;padding:16px;border-radius:13px;border:1px solid var(--line);
    background:#fff;color:var(--ink);cursor:pointer;transition:.12s;}
  .opt:hover{border-color:var(--green);}
  .opt.correct{background:var(--green-soft);border-color:var(--green);color:var(--green);}
  .opt.wrong{background:#fdecec;border-color:#e0b4b4;color:#b23b3b;}
  .opt:disabled{cursor:default;}
  .q-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-weight:800;font-size:14px;color:var(--muted);}
  .q-score{color:var(--green);}
  .q-done{text-align:center;}
  .q-done .big{font-size:54px;font-weight:900;color:var(--green);}

  footer{padding:24px 40px;background:var(--wash);font-size:13px;color:var(--muted);}
  @media(max-width:720px){
    main{width:100%;margin:0;border-radius:0;border-left:0;border-right:0;}
    header,.controls,section.view,footer{padding-left:18px;padding-right:18px;}
    h1{font-size:27px;} .toggles{margin-left:0;width:100%;}
    .q-opts{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<main>
  <header>
    <a class="back" href="./">← Stage 4 Chinese home</a>
    <h1>School Words <span class="zh">学校词语</span></h1>
    <p class="subtitle">The Chinese for school, subjects and days. Tap any word to hear it.</p>
    <div class="badges"><span class="b-y7">Year 7</span><span class="b-y8">Year 8</span>
      <span style="font-size:13px;color:var(--muted);font-weight:700;">Y8 tip: turn off pinyin to test your characters.</span></div>
  </header>

  <div class="controls">
    <div class="tabs">
      <button class="tab active" data-mode="learn">📖 Learn</button>
      <button class="tab" data-mode="flash">🃏 Flashcards</button>
      <button class="tab" data-mode="quiz">✅ Quiz</button>
    </div>
    <div class="toggles">
      <button class="chip on" id="tg-py">Pinyin <span class="x">✓</span></button>
      <button class="chip on" id="tg-en">English <span class="x">✓</span></button>
    </div>
  </div>

  <!-- LEARN -->
  <section class="view" id="view-learn"></section>

  <!-- FLASHCARDS -->
  <section class="view hidden" id="view-flash">
    <div class="fc-wrap">
      <div class="fc-pick">
        <select id="fc-cat"></select>
        <select id="fc-side">
          <option value="hz">Show characters first</option>
          <option value="en">Show English first</option>
          <option value="py">Show pinyin first</option>
        </select>
      </div>
      <div class="card3d" id="fc-card">
        <div class="inner">
          <div class="face front" id="fc-front"></div>
          <div class="face back" id="fc-back"></div>
        </div>
      </div>
      <div class="btnrow">
        <button class="btn" id="fc-speak">🔊 Hear</button>
        <button class="btn primary" id="fc-flip">Flip</button>
        <button class="btn" id="fc-next">Next →</button>
        <button class="btn" id="fc-shuffle">🔀 Shuffle</button>
      </div>
      <div class="fc-count" id="fc-count"></div>
    </div>
  </section>

  <!-- QUIZ -->
  <section class="view hidden" id="view-quiz">
    <div class="quiz-wrap" id="quiz-body"></div>
  </section>

  <footer>Stage 4 Chinese · 2026 · School Words — for Year 7 &amp; 8. Audio uses your device's Chinese voice.</footer>
</main>

<script>
const VOCAB = [
  // School & people
  {hz:"学校",py:"xuéxiào",en:"school",cat:"sub",a:"xuexiao"},
  {hz:"老师",py:"lǎoshī",en:"teacher",cat:"sub",a:"laoshi"},
  {hz:"同学",py:"tóngxué",en:"classmate",cat:"sub",a:"tongxue"},
  {hz:"学生",py:"xuésheng",en:"student",cat:"sub",a:"xuesheng"},
  {hz:"课",py:"kè",en:"class / lesson",cat:"sub",a:"ke"},
  {hz:"课程表",py:"kèchéngbiǎo",en:"timetable",cat:"sub",a:"kechengbiao"},
  // Subjects
  {hz:"中文",py:"Zhōngwén",en:"Chinese",cat:"subj",a:"zhongwen"},
  {hz:"英文",py:"Yīngwén",en:"English",cat:"subj",a:"yingwen"},
  {hz:"数学",py:"shùxué",en:"Maths",cat:"subj",a:"shuxue"},
  {hz:"科学",py:"kēxué",en:"Science",cat:"subj",a:"kexue"},
  {hz:"体育",py:"tǐyù",en:"PE / Sport",cat:"subj",a:"tiyu"},
  {hz:"音乐",py:"yīnyuè",en:"Music",cat:"subj",a:"yinyue"},
  {hz:"美术",py:"měishù",en:"Art",cat:"subj",a:"meishu"},
  {hz:"历史",py:"lìshǐ",en:"History",cat:"subj",a:"lishi"},
  {hz:"地理",py:"dìlǐ",en:"Geography",cat:"subj",a:"dili"},
  {hz:"电脑",py:"diànnǎo",en:"Computing",cat:"subj",a:"diannao"},
  // Days
  {hz:"星期一",py:"xīngqīyī",en:"Monday",cat:"day",a:"xingqi1"},
  {hz:"星期二",py:"xīngqī'èr",en:"Tuesday",cat:"day",a:"xingqi2"},
  {hz:"星期三",py:"xīngqīsān",en:"Wednesday",cat:"day",a:"xingqi3"},
  {hz:"星期四",py:"xīngqīsì",en:"Thursday",cat:"day",a:"xingqi4"},
  {hz:"星期五",py:"xīngqīwǔ",en:"Friday",cat:"day",a:"xingqi5"},
  {hz:"星期六",py:"xīngqīliù",en:"Saturday",cat:"day",a:"xingqi6"},
  {hz:"星期日",py:"xīngqīrì",en:"Sunday",cat:"day",a:"xingqi7"},
  {hz:"今天",py:"jīntiān",en:"today",cat:"day",a:"jintian"},
  // Useful words
  {hz:"有",py:"yǒu",en:"to have",cat:"use",a:"you"},
  {hz:"和",py:"hé",en:"and",cat:"use",a:"he"},
  {hz:"很",py:"hěn",en:"very",cat:"use",a:"hen"},
  {hz:"喜欢",py:"xǐhuan",en:"to like",cat:"use",a:"xihuan"},
  {hz:"不喜欢",py:"bù xǐhuan",en:"to not like",cat:"use",a:"buxihuan"},
];
const PATTERNS = [
  {hz:"我喜欢中文。",py:"Wǒ xǐhuan Zhōngwén.",en:"I like Chinese.",a:"pat1"},
  {hz:"我不喜欢数学。",py:"Wǒ bù xǐhuan shùxué.",en:"I don't like Maths.",a:"pat2"},
  {hz:"星期一我有体育。",py:"Xīngqīyī wǒ yǒu tǐyù.",en:"On Monday I have PE.",a:"pat3"},
  {hz:"我的中文老师很好。",py:"Wǒ de Zhōngwén lǎoshī hěn hǎo.",en:"My Chinese teacher is very good.",a:"pat4"},
];
const CATS = [
  {key:"sub", cls:"cat-sub", name:"School & People"},
  {key:"subj",cls:"cat-subj",name:"Subjects 科目"},
  {key:"day", cls:"cat-day", name:"Days of the Week 星期"},
  {key:"use", cls:"cat-use", name:"Useful Words"},
];

/* ---- audio: pre-recorded DashScope CosyVoice MP3s, browser TTS as fallback ---- */
let voices=[];
function loadVoices(){voices=window.speechSynthesis?speechSynthesis.getVoices():[];}
if('speechSynthesis' in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
let curAudio=null;
function play(item){
  if(item&&item.a){
    try{if(curAudio){curAudio.pause();}}catch(e){}
    const a=new Audio('audio/'+item.a+'.mp3');
    curAudio=a;
    a.play().catch(()=>speakTTS(item.hz));
    return;
  }
  speakTTS(item?item.hz:'');
}
function speakTTS(text){
  if(!('speechSynthesis' in window)||!text)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';u.rate=.82;
  const v=voices.find(v=>/zh[-_]CN/i.test(v.lang))||voices.find(v=>/zh/i.test(v.lang))||voices.find(v=>/chinese|中文|普通话/i.test(v.name));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}

/* ---- Learn ---- */
function wordCard(w){
  const d=document.createElement('button');
  d.className='word zh';
  d.innerHTML=`<button class="spk" title="Hear it" aria-label="Hear it">🔊</button>
    <div class="hz">${w.hz}</div><div class="py">${w.py}</div><div class="en">${w.en}</div>`;
  d.addEventListener('click',()=>play(w));
  return d;
}
function renderLearn(){
  const root=document.getElementById('view-learn');root.innerHTML='';
  CATS.forEach(c=>{
    const items=VOCAB.filter(w=>w.cat===c.key);
    const sec=document.createElement('div');sec.className='cat';
    sec.innerHTML=`<h2 class="${c.cls}"><span class="dot"></span>${c.name}</h2>`;
    const g=document.createElement('div');g.className='grid';
    items.forEach(w=>g.appendChild(wordCard(w)));
    sec.appendChild(g);root.appendChild(sec);
  });
  // patterns
  const sec=document.createElement('div');sec.className='cat';
  sec.innerHTML=`<h2 class="cat-pat"><span class="dot"></span>Put It Together — Sentences</h2>`;
  const g=document.createElement('div');g.className='grid patterns';
  PATTERNS.forEach(w=>g.appendChild(wordCard(w)));
  sec.appendChild(g);root.appendChild(sec);
}

/* ---- toggles ---- */
function bindToggle(id,cls){
  const b=document.getElementById(id);
  b.addEventListener('click',()=>{
    const on=b.classList.toggle('on');
    document.body.classList.toggle(cls,!on);
    b.querySelector('.x').textContent=on?'✓':'✕';
  });
}
bindToggle('tg-py','no-py');
bindToggle('tg-en','no-en');

/* ---- mode tabs ---- */
const views={learn:'view-learn',flash:'view-flash',quiz:'view-quiz'};
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const m=t.dataset.mode;
    Object.values(views).forEach(v=>document.getElementById(v).classList.add('hidden'));
    document.getElementById(views[m]).classList.remove('hidden');
    if(m==='quiz')startQuiz();
    if(m==='flash')renderFlash();
  });
});

/* ---- Flashcards ---- */
let fcDeck=[],fcIdx=0;
function fcSource(){
  const cat=document.getElementById('fc-cat').value;
  let pool = cat==='all' ? VOCAB.slice() : (cat==='pat'?PATTERNS.slice():VOCAB.filter(w=>w.cat===cat));
  return pool;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function renderFlash(){
  if(!document.getElementById('fc-cat').options.length){
    const sel=document.getElementById('fc-cat');
    sel.innerHTML='<option value="all">All words</option>'+CATS.map(c=>`<option value="${c.key}">${c.name}</option>`).join('')+'<option value="pat">Sentences</option>';
  }
  fcDeck=shuffle(fcSource());fcIdx=0;showFc();
}
function side(v,w){return v==='hz'?w.hz:(v==='py'?w.py:w.en);}
function showFc(){
  const card=document.getElementById('fc-card');card.classList.remove('flipped');
  const w=fcDeck[fcIdx];if(!w)return;
  const first=document.getElementById('fc-side').value;
  const order=first==='hz'?['hz','py','en']:(first==='py'?['py','hz','en']:['en','hz','py']);
  const front=document.getElementById('fc-front'),back=document.getElementById('fc-back');
  const cls=k=>k==='hz'?'big zh':(k==='py'?'mid':'sm');
  front.innerHTML=`<div class="${cls(order[0])}">${side(order[0],w)}</div><div class="taphint">tap to flip</div>`;
  back.innerHTML=`<div class="${cls(order[1])}">${side(order[1],w)}</div><div class="${cls(order[2])}">${side(order[2],w)}</div>`;
  document.getElementById('fc-count').textContent=`Card ${fcIdx+1} of ${fcDeck.length}`;
}
document.getElementById('fc-card').addEventListener('click',()=>document.getElementById('fc-card').classList.toggle('flipped'));
document.getElementById('fc-flip').addEventListener('click',()=>document.getElementById('fc-card').classList.toggle('flipped'));
document.getElementById('fc-next').addEventListener('click',()=>{fcIdx=(fcIdx+1)%fcDeck.length;showFc();});
document.getElementById('fc-shuffle').addEventListener('click',renderFlash);
document.getElementById('fc-speak').addEventListener('click',()=>play(fcDeck[fcIdx]));
document.getElementById('fc-cat').addEventListener('change',renderFlash);
document.getElementById('fc-side').addEventListener('change',showFc);

/* ---- Quiz ---- */
let qList=[],qPos=0,qScore=0;
function startQuiz(){
  qList=shuffle(VOCAB.slice()).slice(0,10);qPos=0;qScore=0;showQ();
}
function showQ(){
  const body=document.getElementById('quiz-body');
  if(qPos>=qList.length){
    body.innerHTML=`<div class="q-done"><div class="big">${qScore}/${qList.length}</div>
      <p style="font-weight:800;font-size:18px;margin:6px 0 18px">${qScore>=9?'Outstanding! 太棒了！':qScore>=7?'Great work! 很好！':qScore>=5?'Good — keep practising!':'Keep going — try again!'}</p>
      <button class="btn primary" onclick="startQuiz()">Try again 🔁</button></div>`;
    return;
  }
  const w=qList[qPos];
  const wrong=shuffle(VOCAB.filter(x=>x.en!==w.en)).slice(0,3);
  const opts=shuffle([w,...wrong]);
  body.innerHTML=`
    <div class="q-bar"><span>Question ${qPos+1} / ${qList.length}</span><span class="q-score">Score: ${qScore}</span></div>
    <div class="q-prompt">What does this mean?</div>
    <div class="q-term zh">${w.hz}</div>
    <div class="q-termpy">${w.py}</div>
    <div class="q-opts">${opts.map(o=>`<button class="opt" data-en="${o.en}">${o.en}</button>`).join('')}</div>`;
  play(w);
  body.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{
    body.querySelectorAll('.opt').forEach(x=>{x.disabled=true;if(x.dataset.en===w.en)x.classList.add('correct');});
    if(b.dataset.en===w.en){qScore++;}else{b.classList.add('wrong');}
    setTimeout(()=>{qPos++;showQ();},950);
  }));
}

renderLearn();
</script>
